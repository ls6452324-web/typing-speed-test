    <script>
        const sampleParagraphs = [
            "The quick brown fox jumps over the lazy dog. This classic phrase contains every letter in the English alphabet and is perfect for practicing your typing speed and finger movement.",
            "Success is not final, failure is not fatal: it is the courage to continue that counts. Working hard on your goals every single day will eventually bring the results you desire.",
            "Technology is evolving at a very fast pace. Learning how to type efficiently is a core skill in the modern digital world, saving you hours of work every week."
        ];

        let timeLeft = 60;
        let timer = null;
        let isTracking = false;
        let currentText = "";
        let totalCharactersTyped = 0;
        let errors = 0;

        const textDisplay = document.getElementById("text-display");
        const textInput = document.getElementById("text-input");
        const timerElement = document.getElementById("timer");
        const wpmElement = document.getElementById("wpm");
        const accuracyElement = document.getElementById("accuracy");
        const resetBtn = document.getElementById("reset-btn");

        function initTest() {
            clearInterval(timer);
            timeLeft = 60;
            isTracking = false;
            errors = 0;
            totalCharactersTyped = 0;
            
            timerElement.innerText = timeLeft;
            wpmElement.innerText = "0";
            accuracyElement.innerText = "100";
            textInput.value = "";
            textInput.disabled = false;

            // Pick random paragraph
            currentText = sampleParagraphs[Math.floor(Math.random() * sampleParagraphs.length)];
            
            // Render text word by word or character by character
            textDisplay.innerHTML = currentText.split('').map((char, index) => {
                if(index === 0) return `<span class="current">${char}</span>`;
                return `<span>${char}</span>`;
            }).join('');
        }

        function startTimer() {
            isTracking = true;
            timer = setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft--;
                    timerElement.innerText = timeLeft;
                    calculateStats();
                } else {
                    clearInterval(timer);
                    textInput.disabled = true;
                    // 4. HINT: POPUP/INTERSTITIAL AD TIME
                    // Aap yahan automatic popup ad trigger kar sakti hain test khatam hone par
                    alert("Test Finished! Check your final scores.");
                }
            }, 1000);
        }

        textInput.addEventListener("input", () => {
            if (!isTracking && textInput.value.length > 0) {
                startTimer();
            }

            const inputChars = textInput.value.split('');
            const spanChars = textDisplay.querySelectorAll('span');
            errors = 0;
            totalCharactersTyped = inputChars.length;

            spanChars.forEach((span, index) => {
                const character = inputChars[index];
                
                // Reset classes
                span.className = '';

                if (character == null) {
                    if (index === inputChars.length) {
                        span.classList.add('current');
                    }
                } else if (character === span.innerText) {
                    span.classList.add('correct');
                } else {
                    span.classList.add('incorrect');
                    errors++;
                }
            });

            calculateStats();
        });

        function calculateStats() {
            let timeElapsed = 60 - timeLeft;
            if (timeElapsed <= 0) timeElapsed = 1;

            // WPM calculation (1 word = 5 characters)
            let words = totalCharactersTyped / 5;
            let wpm = Math.round((words / timeElapsed) * 60);
            wpmElement.innerText = wpm < 0 || !wpm || wpm === Infinity ? 0 : wpm;

            // Accuracy calculation
            if (totalCharactersTyped > 0) {
                let accuracy = Math.round(((totalCharactersTyped - errors) / totalCharactersTyped) * 100);
                accuracyElement.innerText = accuracy < 0 ? 0 : accuracy;
            }
        }

        resetBtn.addEventListener("click", initTest);

        // Load test on start
        window.onload = initTest;
    </script>
